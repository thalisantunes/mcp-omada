name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel a redundant in-progress run when new commits land on the same
# branch/PR, instead of letting stale runs keep occupying runners.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (with dev dependencies)
        run: pip install -e ".[dev]"

      - name: ruff check (lint)
        run: ruff check .

      - name: ruff format --check (formatting)
        run: ruff format --check .

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (with dev dependencies)
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy src/mcp_omada

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev dependencies)
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=mcp_omada --cov-report=term-missing --cov-report=xml --cov-fail-under=100

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14
